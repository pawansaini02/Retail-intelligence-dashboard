version: "3.9"

# =============================================================================
# Retail Demand & Inventory Intelligence System — Full Stack
# =============================================================================
# Services: PostgreSQL · Redis · Kafka + Zookeeper · InfluxDB · MLflow
#           Airflow · FastAPI · React Dashboard · Grafana
#
# Start: docker compose up -d
# Logs:  docker compose logs -f api
# Stop:  docker compose down -v
# =============================================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.2-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://retail:${POSTGRES_PASSWORD}@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    DATABASE_URL: postgresql://retail:${POSTGRES_PASSWORD}@postgres/retail_intelligence
    MLFLOW_TRACKING_URI: http://mlflow:5000
    KAFKA_BROKERS: kafka:29092
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./spark_jobs:/opt/airflow/spark_jobs
    - ./ml:/opt/airflow/ml
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: retail_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: retail_intelligence,airflow,mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/schema/init.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./infra/postgres/create_multiple_dbs.sh:/docker-entrypoint-initdb.d/00_create_dbs.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail -d retail_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10
    shm_size: 256mb

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: retail_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: retail_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  # ── Kafka ───────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: retail_kafka
    restart: unless-stopped
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      retries: 10

  # Kafka topic initializer
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic sales-events       --partitions 5 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic inventory-updates  --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic forecast-events    --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic anomaly-alerts     --partitions 2 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic promotions         --partitions 2 --replication-factor 1
      echo 'Topics created.'
      "

  # ── InfluxDB ────────────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7-alpine
    container_name: retail_influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: retail-intelligence
      DOCKER_INFLUXDB_INIT_BUCKET: ml-metrics
      DOCKER_INFLUXDB_INIT_RETENTION: 90d
    volumes:
      - influxdb_data:/var/lib/influxdb2
    ports:
      - "8086:8086"

  # ── MLflow ──────────────────────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: retail_mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "pip install mlflow psycopg2-binary boto3 --quiet &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri postgresql://retail:${POSTGRES_PASSWORD}@postgres/mlflow
               --default-artifact-root /mlartifacts
               --workers 2"
    volumes:
      - mlartifacts:/mlartifacts
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      retries: 10

  # ── Airflow Webserver ───────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: retail_airflow_web
    restart: unless-stopped
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      retries: 15

  # ── Airflow Scheduler ───────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: retail_airflow_scheduler
    restart: unless-stopped
    command: scheduler

  # ── Airflow Init (one-shot) ─────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: retail_airflow_init
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create -r Admin -u admin -p ${AIRFLOW_ADMIN_PASSWORD} -f Admin -l User -e admin@retail.ai &&
        echo 'Airflow initialised.'
      "
    restart: "no"

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: retail_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://retail:${POSTGRES_PASSWORD}@postgres/retail_intelligence
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: kafka:29092
      MLFLOW_TRACKING_URI: http://mlflow:5000
      LOG_LEVEL: info
      WORKERS: 4
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      retries: 10

  # ── React Dashboard ─────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: retail_dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:80"

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: retail_grafana
    restart: unless-stopped
    depends_on: [influxdb, postgres]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  influxdb_data:
  mlartifacts:
  airflow_logs:
  grafana_data:

networks:
  default:
    name: retail_intelligence_net
